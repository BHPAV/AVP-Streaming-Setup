repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json
  - repo: local
    hooks:
      - id: pwshfmt
        name: "PowerShell Formatter (Invoke-Formatter)"
        entry: pwsh -c "Param([string[]]$files) foreach ($f in $files) { Invoke-Formatter -ScriptPath $f -Settings @{IncludeRules=@();ExcludeRules=@()} }" --
        language: system
        types: [ps1, psm1] 